apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-deploy
  annotations:
    kubernetes.io/change-cause: "deploying v3:changed image to redis:6"
spec:
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: assignment-service
  replicas: 3
  template:
    metadata:
      labels:
        app: assignment-service
    spec:
      containers:
      - name: assignment-service
        image: redis:6
        ports:
          - name: "app-port"
            containerPort: 6379
