apiVersion: v1
kind: ConfigMap
metadata:
  name: app-properties
data:
  application.properties: | 
    appUrl= http://my-app-service
    timeout=30
    caro-test=bird detective
    josh-test=jets manager
---
apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  terminationGracePeriodSeconds: 1
  restartPolicy: Never
  containers:
  - name: ubuntu
    image: ubuntu
    volumeMounts: 
    - name: config-volume
      mountPath: /usr/share/props  #if path does not exist it will be created and file stored there
    args:
    - sleep
    - "3600"
  volumes: 
    - name: config-volume
      configMap:
        name: app-properties

