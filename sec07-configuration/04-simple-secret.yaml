apiVersion: v1
kind: Secret
metadata:
  name: app-secret
data:
  username: Y21hbG8=
  password: YWRtaW4xMjM=
---
apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  restartPolicy: Never
  containers:
  - name: ubuntu
    image: ubuntu
    env:
    - name: "app.username"
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: username
    - name: "app.password"
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: password
    args:
    - env
